document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

g\">'+m+'<\u002Fspan>';}).join(\"\")+'<\u002Fdiv>'+\n    (trim.concat(graphic).length?'<div style=\"font-size:11px;opacity:0.6\">'+trim.concat(graphic).join(\" · \")+'<\u002Fdiv>':\"\");\n}\nfunction accUserBody(){\n  var ln=currentLine,model=currentModel,isEn=lang===\"en\",L=I18N[lang];\n  var html='';\n  if(model&&model.personas&&model.personas.length){\n    model.personas.forEach(function(p){\n      var label=isEn?p.labelEn:p.labelZh;var ptags=(isEn?p.tagsEn:p.tagsZh)||[];\n      html+='<div class=\"user-persona-card\">'+(p.region?'<span class=\"user-region-badge\">'+p.region+'<\u002Fspan><br>':'')+'<div class=\"user-persona-name\">'+label+'<\u002Fdiv><div class=\"dim-tags\" style=\"margin-top:8px\">'+ptags.map(function(t){return '<span class=\"dim-tag\">'+t+'<\u002Fspan>';}).join(\"\")+'<\u002Fdiv><\u002Fdiv>';\n    });\n  }else{\n    html+='<div class=\"user-persona-name\">'+(isEn?ln.personaEn:ln.personaZh)+'<\u002Fdiv><div style=\"font-size:13px;opacity:0.55;margin-top:2px\">'+(isEn?ln.uLineEn:ln.uLineZh)+'<\u002Fdiv><div class=\"dim-tags\" style=\"margin-top:6px\">'+L.sceneTags.map(function(t){return '<span class=\"dim-tag\">'+t+'<\u002Fspan>';}).join(\"\")+'<\u002Fdiv>';\n  }\n  return html;\n}\nfunction accSiteBody(){\n  var isEn=lang===\"en\";\n  var secs=isEn?[\"Hero\",\"Selling Points\",\"Gallery\",\"Specs\"]:[\"首屏 Hero\",\"卖点模块\",\"图廊\",\"参数页\"];\n  return '<div class=\"moodboard-grid\" style=\"grid-template-columns:1fr\"><div class=\"moodboard-cell\" style=\"aspect-ratio:16/6\"><span>'+(isEn?\"KV Banner\":\"主 KV 占位\")+'<\u002Fspan><\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"hmi-spec-table\">'+secs.map(function(s,i){return '<div class=\"hmi-spec-row-d\"><div class=\"hmi-spec-key\">0'+(i+1)+'<\u002Fdiv><div class=\"hmi-spec-val\">'+s+'<\u002Fdiv><\u002Fdiv>';}).join(\"\")+'<\u002Fdiv>'+\n    '<div class=\"dim-tags\">'+(isEn?[\"Landing\",\"PDP\",\"Compare\"]:[\"落地页\",\"产品页\",\"对比页\"]).map(function(t){return '<span class=\"dim-tag\">'+t+'<\u002Fspan>';}).join(\"\")+'<\u002Fdiv>';\n}\nfunction accMktBody(){\n  var ln=currentLine,isEn=lang===\"en\";\n  return '<div style=\"font-size:18px;font-weight:900;letter-spacing:-0.01em\">'+ln.idWord+'<\u002Fdiv>'+\n    '<div style=\"font-size:12px;opacity:0.45;font-style:italic\">'+(isEn?\"Campaign key message placeholder\":\"传播主语录占位\")+'<\u002Fdiv>'+\n    '<div class=\"moodboard-grid\">'+[1,2].map(function(i){return '<div class=\"moodboard-cell\"><span>KV '+i+'<\u002Fspan><\u002Fdiv>';}).join(\"\")+'<\u002Fdiv>'+\n    '<div class=\"dim-tags\">'+(isEn?[\"E-commerce\",\"Social\",\"Offline\"]:[\"电商\",\"社媒\",\"线下\"]).map(function(t){return '<span class=\"dim-tag\">'+t+'<\u002Fspan>';}).join(\"\")+'<\u002Fdiv>';\n}\nfunction accHmiBody(){\n  var ln=currentLine,L=I18N[lang];\n  var specs=[[L.hmiScreen,\"—\"],[L.hmiDef,ln.idWord],[L.hmiStyle,\"—\"],[L.hmiMotion,\"—\"]].map(function(p){return '<div class=\"hmi-spec-row-d\"><div class=\"hmi-spec-key\">'+p[0]+'<\u002Fdiv><div class=\"hmi-spec-val\">'+p[1]+'<\u002Fdiv><\u002Fdiv>';}).join(\"\");\n  return '<div class=\"hmi-dash-large\">'+dashboardIconSVG()+'<\u002Fdiv><div class=\"hmi-spec-table\">'+specs+'<\u002Fdiv><div class=\"dim-tags\">'+L.hmiTags.map(function(t){return '<span class=\"dim-tag\">'+t+'<\u002Fspan>';}).join(\"\")+'<\u002Fdiv>';\n}\n\nfunction buildAccordion(){\n  if(!currentLine) return;\n  var ln=currentLine,isEn=lang===\"en\",L=I18N[lang];\n  var model=currentModel||ln.models[0];\n  var cmfSum=model.name+\" · \"+model.cmf.length+(isEn?\" colors\":\"色\");\n  var rows;\n  if(role===\"exec\"&&execFn===\"branding\"){\n    rows=[\n      {k:\"user\",title:\"USER\",sub:L.accSubUser,sum:(isEn?ln.personaEn:ln.personaZh),body:accUserBody},\n      {k:\"site\",title:isEn?\"SITE\":\"产品站\",sub:isEn?\"Product Site\":\"页面架构\",sum:isEn?\"Landing · PDP\":\"落地页 · 产品页\",body:accSiteBody},\n      {k:\"mkt\",title:isEn?\"MKT\":\"营销\",sub:isEn?\"Marketing\":\"传播 · 渠道\",sum:\"KV · Campaign\",body:accMktBody}\n    ];\n  }else{\n    rows=[\n      {k:\"user\",title:\"USER\",sub:L.accSubUser,sum:(isEn?ln.personaEn:ln.personaZh),body:accUserBody},\n      {k:\"id\",title:\"ID\",sub:L.accSubId,sum:ln.idWord,body:accIdBody},\n      {k:\"cmf\",title:\"CMF\",sub:L.accSubCmf,sum:cmfSum,body:accCmfBody},\n      {k:\"hmi\",title:\"HMI\",sub:L.accSubHmi,sum:L.hmiTags[0],body:accHmiBody}\n    ];\n    if(role===\"strategy\"||role===\"external\"){\n      rows.push(\n        {k:\"site\",title:isEn?\"SITE\":\"产品站\",sub:isEn?\"Product Site\":\"页面架构\",sum:isEn?\"Landing · PDP\":\"落地页 · 产品页\",body:accSiteBody},\n        {k:\"mkt\",title:isEn?\"MKT\":\"营销\",sub:isEn?\"Marketing\":\"传播 · 渠道\",sum:\"KV · Campaign\",body:accMktBody}\n      );\n    }\n  }\n  document.getElementById(\"acc-module\").innerHTML=rows.map(function(r){\n    var open=!!accOpen[r.k];\n    return '<div class=\"acc-row'+(open?\" open\":\"\")+'\" data-acc=\"'+r.k+'\">'+\n      '<button class=\"acc-head\" type=\"button\" onclick=\"toggleAcc(\\''+r.k+'\\')\">'+\n        '<div class=\"acc-head-l\"><div class=\"acc-title\">'+r.title+'<\u002Fdiv><div class=\"acc-sub\">'+r.sub+'<\u002Fdiv><\u002Fdiv>'+\n        '<div class=\"acc-head-r\"><span class=\"acc-summary\">'+r.sum+'<\u002Fspan><span class=\"acc-sign\">'+(open?\"–\":\"+\")+'<\u002Fspan><\u002Fdiv>'+\n      '<\u002Fbutton>'+\n      '<div class=\"acc-body\">'+r.body()+'<\u002Fdiv>'+\n    '<\u002Fdiv>';\n  }).join(\"\");\n}\nfunction toggleAcc(k){ accOpen[k]=!accOpen[k]; buildAccordion(); syncHotspots(); }\nfunction openAcc(k){\n  accOpen[k]=true; buildAccordion(); syncHotspots();\n  var row=document.querySelector('.acc-row[data-acc=\"'+k+'\"]');\n  var panel=document.getElementById(\"ppanel-main\");\n  if(row&&panel) panel.scrollTo({top:row.offsetTop-90,behavior:\"smooth\"});\n}\nfunction syncHotspots(){\n  var map={user:\"hs-user\",hmi:\"hs-hmi\",id:\"hs-id\",cmf:\"hs-cmf\",site:\"hs-site\",mkt:\"hs-mkt\"};\n  Object.keys(map).forEach(function(k){\n    var hs=document.getElementById(map[k]);if(!hs)return;\n    var row=document.querySelector('.acc-row[data-acc=\"'+k+'\"]');\n    hs.style.display=row?\"flex\":\"none\";\n    var sc=document.getElementById(\"scene-\"+k); if(sc) sc.style.display=row?\"block\":\"none\";\n    hs.classList.toggle(\"active\",!!accOpen[k]);\n  });\n}\n// legacy compat (old callers)\nfunction switchDetailTab(tab){var m={overview:\"id\",design:\"id\",user:\"user\",hmi:\"hmi\",cmf:\"cmf\"};openAcc(m[tab]||tab);}\n\n// ── REFRESH PRODUCT ──\nfunction refreshProduct(){\n  var ln=currentLine,bu=currentBU,model=currentModel,isEn=lang===\"en\";\n  document.getElementById(\"prod-bu\").textContent=(isEn?bu.en:bu.zh)+\" · \"+(isEn?bu.subEn:bu.subZh)+\" · \"+ln.name;\n  document.getElementById(\"prod-name\").textContent=model?model.name:ln.name+I18N[lang].seriesSuffix;\n  document.getElementById(\"prod-pos\").textContent=isEn?ln.posEn:ln.posZh;\n  buildModelTabs();\n  buildAccordion();\n  syncHotspots();\n  var pl=document.getElementById(\"prod-left\");\n  pl.className=\"prod-left\"+(bu.color===\"red\"?\" red-bg\":bu.color===\"black\"?\" black-bg\":\"\");\n  var vEl=document.getElementById(\"prod-vehicle\"),pEl=document.getElementById(\"prod-persona-fig\");\n  vEl.style.opacity=\"0\";pEl.style.opacity=\"0\";\n  setTimeout(function(){vEl.innerHTML=vehicleSVGLarge(bu.color);pEl.innerHTML=personaSVG(bu.color);vEl.style.opacity=\"1\";pEl.style.opacity=\"1\";},140);\n  applyStaticLang();\n}\n\n// ── SVG ──\nfunction vehicleSVG(color){\n  var s=\"rgba(11,11,11,0.42)\";\n  return '<svg viewBox=\"0 0 200 120\" width=\"160\" height=\"80\" style=\"display:block\"><circle cx=\"56\" cy=\"92\" r=\"22\" fill=\"none\" stroke=\"'+s+'\" stroke-width=\"2\"/><circle cx=\"154\" cy=\"92\" r=\"22\" fill=\"none\" stroke=\"'+s+'\" stroke-width=\"2\"/><rect x=\"58\" y=\"82\" width=\"98\" height=\"9\" rx=\"4\" fill=\"none\" stroke=\"'+s+'\" stroke-width=\"2\"/><line x1=\"150\" y1=\"82\" x2=\"144\" y2=\"38\" stroke=\"'+s+'\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"126\" y1=\"38\" x2=\"162\" y2=\"38\" stroke=\"'+s+'\" stroke-width=\"2\" stroke-linecap=\"round\"/><\u002Fsvg>';\n}\nfunction vehicleSVGLarge(color){\n  var s=\"rgba(11,11,11,0.55)\";\n  var s2=\"rgba(11,11,11,0.2)\";\n  return '<svg viewBox=\"0 0 360 300\" style=\"width:100%;display:block\"><circle cx=\"96\" cy=\"232\" r=\"42\" fill=\"none\" stroke=\"'+s+'\" stroke-width=\"2.5\"/><circle cx=\"284\" cy=\"232\" r=\"42\" fill=\"none\" stroke=\"'+s+'\" stroke-width=\"2.5\"/><circle cx=\"96\" cy=\"232\" r=\"16\" fill=\"none\" stroke=\"'+s2+'\" stroke-width=\"1.5\"/><circle cx=\"284\" cy=\"232\" r=\"16\" fill=\"none\" stroke=\"'+s2+'\" stroke-width=\"1.5\"/><rect x=\"100\" y=\"214\" width=\"186\" height=\"14\" rx=\"7\" fill=\"none\" stroke=\"'+s+'\" stroke-width=\"2.5\"/><line x1=\"278\" y1=\"214\" x2=\"268\" y2=\"92\" stroke=\"'+s+'\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"236\" y1=\"92\" x2=\"300\" y2=\"92\" stroke=\"'+s+'\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"268\" y1=\"92\" x2=\"268\" y2=\"120\" stroke=\"'+s2+'\" stroke-width=\"2\"/><line x1=\"104\" y1=\"216\" x2=\"250\" y2=\"120\" stroke=\"'+s2+'\" stroke-width=\"1.5\"/><\u002Fsvg>';\n}\nfunction personaSVG(color){\n  var s=\"rgba(11,11,11,0.5)\";\n  return '<svg viewBox=\"0 0 140 300\" style=\"width:100%;display:block\"><circle cx=\"70\" cy=\"42\" r=\"26\" fill=\"none\" stroke=\"'+s+'\" stroke-width=\"2.5\"/><line x1=\"70\" y1=\"68\" x2=\"70\" y2=\"168\" stroke=\"'+s+'\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"70\" y1=\"90\" x2=\"34\" y2=\"150\" stroke=\"'+s+'\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"70\" y1=\"90\" x2=\"106\" y2=\"150\" stroke=\"'+s+'\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"70\" y1=\"168\" x2=\"42\" y2=\"280\" stroke=\"'+s+'\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"70\" y1=\"168\" x2=\"98\" y2=\"280\" stroke=\"'+s+'\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><\u002Fsvg>';\n}\n\n// ── WIRE STATIC TEMPLATE BUTTONS (DC strips inline onclick) ──\n// Event delegation on document — survives all template re-renders/hot-reloads\nfunction wireStaticHandlers(){\n  if(window._matrixDelegated) return;\n  window._matrixDelegated = true;\n  document.addEventListener(\"click\", function(e){\n    var t = e.target;\n    if(!t || !t.closest) return;\n    var l1 = t.closest(\".l1-btn\");\n    if(l1){ setCat(l1.getAttribute(\"data-cat\"), l1); return; }\n    var seg = t.closest(\".seg-btn\");\n    if(seg){\n      if(seg.id===\"btn-strategy\") setRole(\"strategy\");\n      else if(seg.id===\"btn-exec\") setRole(\"exec\");\n      else if(seg.id===\"btn-external\") setRole(\"external\");\n      else if(seg.id===\"btn-zh\") setLang(\"zh\");\n      else if(seg.id===\"btn-en\") setLang(\"en\");\n      return;\n    }\n    var lb = t.closest(\"#btn-lang\");\n    if(lb){ setLang(lang===\"zh\"?\"en\":\"zh\"); return; }\n    var mtab = t.closest(\".model-tab\");\n    if(mtab){ return; }\n    var hs = t.closest(\".hotspot\");\n    if(hs){\n      var hm={\"hs-user\":\"user\",\"hs-hmi\":\"hmi\",\"hs-id\":\"id\",\"hs-cmf\":\"cmf\",\"hs-site\":\"site\",\"hs-mkt\":\"mkt\"};\n      if(hm[hs.id]){ if(accOpen[hm[hs.id]]) toggleAcc(hm[hs.id]); else openAcc(hm[hs.id]); }\n      return;\n    }\n    if(t.closest(\".prod-back\")){ goBack(); return; }\n  }, false);\n}\n\n// ── DOTS ──\nfunction updateDots(idx){document.querySelectorAll(\".pdot\").forEach(function(d){d.classList.toggle(\"active\",parseInt(d.dataset.idx)===idx);});}\n\n// ── INIT FUNCTIONS ──\nfunction initScrollObserver(){\n  var root=document.getElementById(\"scroll-root\");\n  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)updateDots(parseInt(e.target.dataset.idx));});},{threshold:0.5,root:root});\n  document.querySelectorAll(\".screen\").forEach(function(s){obs.observe(s);});\n}\nfunction initKeyboard(){\n  document.addEventListener(\"keydown\",function(e){if(e.key===\"Escape\"&&document.getElementById(\"s-product\").classList.contains(\"visible\"))goBack();});\n}\nfunction initStageContinuity(){\n  var reduceMotion=window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n  var mq=window.matchMedia(\"(max-width: 901px)\");\n  var wasStacked=mq.matches,cachedRect=null;\n  function readRect(){var stage=document.getElementById(\"prod-stage\");var s=document.getElementById(\"s-product\");if(!stage||!s.classList.contains(\"visible\"))return null;return stage.getBoundingClientRect();}\n  function check(){\n    var nowStacked=mq.matches,stage=document.getElementById(\"prod-stage\");\n    if(nowStacked!==wasStacked){\n      if(stage&&cachedRect&&!reduceMotion){\n        var now=stage.getBoundingClientRect();\n        var dLeft=cachedRect.left-now.left,dTop=cachedRect.top-now.top;\n        var sx=cachedRect.width/now.width,sy=cachedRect.height/now.height;\n        stage.style.transition=\"none\";stage.style.transformOrigin=\"top left\";\n        stage.style.transform=\"translate(\"+dLeft+\"px,\"+dTop+\"px) scale(\"+sx+\",\"+sy+\")\";\n        void stage.offsetWidth;\n        requestAnimationFrame(function(){stage.style.transition=\"transform 380ms cubic-bezier(.4,0,.2,1)\";stage.style.transform=\"none\";});\n      }\n      wasStacked=nowStacked;\n    }\n    cachedRect=readRect();\n  }\n  var raf=null;\n  window.addEventListener(\"resize\",function(){if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(check);});\n}\nfunction initHeroCanvas(){\n  var canvas=document.getElementById(\"hero-canvas\");\n  if(!canvas) return;\n  var ctx=canvas.getContext(\"2d\"),CELL=64,W,H,cols,rows,cells;\n  function init(){\n    canvas.width=canvas.offsetWidth*devicePixelRatio;canvas.height=canvas.offsetHeight*devicePixelRatio;\n    ctx.scale(devicePixelRatio,devicePixelRatio);\n    W=canvas.offsetWidth;H=canvas.offsetHeight;\n    cols=Math.ceil(W/CELL)+1;rows=Math.ceil(H/CELL)+1;cells=[];\n    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)cells.push({x:c*CELL,y:r*CELL,val:(Math.random()*9.99).toFixed(2),phase:Math.random()*Math.PI*2,speed:0.003+Math.random()*0.004,isRed:Math.random()<0.04,showVal:Math.random()<0.18});\n  }\n  init();window.addEventListener(\"resize\",init);\n  var t=0;\n  function draw(){\n    ctx.clearRect(0,0,W,H);ctx.fillStyle=\"#0A0A0A\";ctx.fillRect(0,0,W,H);\n    ctx.strokeStyle=\"rgba(255,255,255,0.04)\";ctx.lineWidth=0.5;\n    for(var c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();}\n    for(var r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();}\n    ctx.font='10px \"JetBrains Mono\",monospace';\n    cells.forEach(function(cell){\n      var breath=(Math.sin(t*cell.speed+cell.phase)+1)/2;\n      var dotAlpha=0.05+breath*0.09;\n      ctx.fillStyle=cell.isRed?\"rgba(37,0,253,\"+(dotAlpha*1.9)+\")\":\"rgba(255,255,255,\"+dotAlpha+\")\";\n      ctx.beginPath();ctx.arc(cell.x,cell.y,1.5,0,Math.PI*2);ctx.fill();\n      if(cell.showVal){var valAlpha=0.035+breath*0.055;ctx.fillStyle=cell.isRed?\"rgba(37,0,253,\"+(valAlpha*1.6)+\")\":\"rgba(255,255,255,\"+valAlpha+\")\";ctx.fillText(cell.val,cell.x+5,cell.y+17);}\n    });\n    t++;requestAnimationFrame(draw);\n  }\n  draw();\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
