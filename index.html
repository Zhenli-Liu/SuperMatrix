  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

}\n\n// ── LOGIN ──\nvar loggedIn=false, loginRole=\"strategy\";\nfunction initLogin(){\n  document.getElementById(\"scroll-root\").style.overflowY=\"hidden\";\n  document.querySelectorAll(\".login-role\").forEach(function(b){\n    b.addEventListener(\"click\",function(){\n      loginRole=b.dataset.role;\n      document.querySelectorAll(\".login-role\").forEach(function(x){x.classList.toggle(\"active\",x===b);});\n    });\n  });\n  var pass=document.getElementById(\"login-pass\");\n  pass.addEventListener(\"keydown\",function(e){if(e.key===\"Enter\")doLogin();});\n  var lb=document.getElementById(\"login-btn\"); if(lb) lb.addEventListener(\"click\",doLogin);\n}\nfunction doLogin(){\n  var pass=document.getElementById(\"login-pass\");\n  var err=document.getElementById(\"login-err\");\n  if(pass.value.trim().toUpperCase()!==\"DC2026\"){\n    err.style.opacity=\"1\"; pass.style.borderColor=\"#EA3328\";\n    clearTimeout(window._errT);\n    window._errT=setTimeout(function(){err.style.opacity=\"0\";pass.style.borderColor=\"\";},2200);\n    return;\n  }\n  fadeIntoMatrix();\n}\nfunction finishLogin(){\n  loggedIn=true;\n  var cov=document.getElementById(\"s-cover\");\n  if(cov) cov.style.display=\"none\";\n  var nav=document.querySelector(\"nav\"); if(nav) nav.style.display=\"\";\n  var root=document.getElementById(\"scroll-root\");\n  root.style.overflowY=\"scroll\";\n  root.scrollTop=0;\n  document.getElementById(\"role-sim\").style.display=\"flex\";\n  document.getElementById(\"page-dots\").classList.add(\"on\");\n  setRole(loginRole);\n  updateDots(1);\n}\n// cover fades out, matrix fades in beneath\nfunction fadeIntoMatrix(){\n  var fade=document.getElementById(\"lp-cl\");\n  fade.innerHTML=\"\"; fade.style.clipPath=\"none\"; fade.style.background=\"#EDEDED\"; fade.style.display=\"block\"; fade.style.opacity=\"1\";\n  document.getElementById(\"lp-cr\").style.display=\"none\";\n  finishLogin();\n  var a=fade.animate([{opacity:1},{opacity:0}],{duration:650,easing:\"ease\",fill:\"forwards\"});\n  a.onfinish=function(){fade.style.display=\"none\";};\n}\n// landing extras: hide site nav pre-login, white headline copy clipped to the black band, entrance\nfunction initLanding(){\n  var nav=document.querySelector(\"nav\"); if(nav) nav.style.display=\"none\";\n}\nfunction ensureDefaultProduct(){\n  if(currentBU&&currentLine&&!isBuLocked(currentBU)&&canOpenLine(currentBU,currentLine)){refreshProduct();return true;}\n  for(var i=0;i<DATA.length;i++){\n    var bu=DATA[i];\n    if(isBuLocked(bu)) continue;\n    for(var j=0;j<bu.lines.length;j++){\n      if(canOpenLine(bu,bu.lines[j])){\n        currentBU=bu; currentLine=bu.lines[j];\n        currentModel=null;\n        activeDetailTab=\"overview\";\n        refreshProduct();\n        return true;\n      }\n    }\n  }\n  return false;\n}\n\n// ── ROLE SIM WIDGET (drag + collapse) ──\nfunction initRoleSimWidget(){\n  // Delegated handlers survive DOM re-renders\n  document.addEventListener(\"click\",function(e){\n    var tog=e.target.closest&&e.target.closest(\"#role-sim-toggle\");\n    if(!tog) return;\n    e.stopPropagation();\n    var el=document.getElementById(\"role-sim\");\n    el.classList.toggle(\"collapsed\");\n    tog.textContent=el.classList.contains(\"collapsed\")?\"+\":\"−\";\n  },true);\n  var dragging=false,sx=0,sy=0,ox=0,oy=0;\n  document.addEventListener(\"pointerdown\",function(e){\n    var el=e.target.closest&&e.target.closest(\"#role-sim\");\n    if(!el||e.target.closest(\"button\")) return;\n    dragging=true; sx=e.clientX; sy=e.clientY;\n    var r=el.getBoundingClientRect(); ox=r.left; oy=r.top;\n    el.classList.add(\"dragging\");\n  });\n  document.addEventListener(\"pointermove\",function(e){\n    if(!dragging) return;\n    var el=document.getElementById(\"role-sim\");\n    var nl=Math.min(Math.max(ox+e.clientX-sx,8),window.innerWidth-el.offsetWidth-8);\n    var nt=Math.min(Math.max(oy+e.clientY-sy,8),window.innerHeight-el.offsetHeight-8);\n    el.style.left=nl+\"px\"; el.style.top=nt+\"px\";\n    el.style.bottom=\"auto\"; el.style.transform=\"none\";\n  });\n  function endDrag(){\n    if(!dragging) return;\n    dragging=false;\n    var el=document.getElementById(\"role-sim\");\n    if(el) el.classList.remove(\"dragging\");\n  }\n  document.addEventListener(\"pointerup\",endDrag);\n  document.addEventListener(\"pointercancel\",endDrag);\n}\n\n// ── INIT FUNCTIONS ──\nfunction initScrollObserver(){\n  var root=document.getElementById(\"scroll-root\");\n  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)updateDots(parseInt(e.target.dataset.idx));});},{threshold:0.5,root:root});\n  document.querySelectorAll(\".screen\").forEach(function(s){obs.observe(s);});\n}\nfunction initKeyboard(){\n  document.addEventListener(\"keydown\",function(e){if(e.key===\"Escape\"&&document.getElementById(\"s-product\").classList.contains(\"visible\"))goBack();});\n}\nfunction initSplitter(){\n  var d=document.getElementById(\"prod-divider-drag\"),split=document.querySelector(\".prod-split\"),left=document.getElementById(\"prod-left\");\n  if(!d||!split||!left) return;\n  var saved=parseFloat(localStorage.getItem(\"sm_split_pct\"));\n  if(!isNaN(saved)) left.style.flexBasis=Math.min(65,Math.max(35,saved))+\"%\";\n  var dragging=false;\n  function onMove(e){\n    if(!dragging) return;\n    var r=split.getBoundingClientRect();\n    var x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;\n    var pct=Math.min(65,Math.max(35,x/r.width*100));\n    left.style.flexBasis=pct+\"%\";\n  }\n  function stop(){\n    if(!dragging) return;\n    dragging=false;d.classList.remove(\"dragging\");\n    document.body.style.userSelect=\"\";document.body.style.cursor=\"\";\n    localStorage.setItem(\"sm_split_pct\",parseFloat(left.style.flexBasis)||35);\n    window.removeEventListener(\"mousemove\",onMove);window.removeEventListener(\"touchmove\",onMove);\n    window.removeEventListener(\"mouseup\",stop);window.removeEventListener(\"touchend\",stop);\n  }\n  function start(e){\n    dragging=true;d.classList.add(\"dragging\");\n    document.body.style.userSelect=\"none\";document.body.style.cursor=\"col-resize\";\n    window.addEventListener(\"mousemove\",onMove);window.addEventListener(\"touchmove\",onMove,{passive:false});\n    window.addEventListener(\"mouseup\",stop);window.addEventListener(\"touchend\",stop);\n    e.preventDefault();\n  }\n  d.addEventListener(\"mousedown\",start);\n  d.addEventListener(\"touchstart\",start,{passive:false});\n}\n// ── BOUNDARY-LOCK WHEEL PAGING ──\n// Inner scrollables scroll natively; page flips only on a deliberate wheel\n// gesture when the inner content is already at its edge (or there is none).\nfunction initWheelPaging(){\n  var root=document.getElementById(\"scroll-root\");\n  var acc=0,lastFlip=0,edgeArm=0;\n  root.addEventListener(\"wheel\",function(e){\n    if(!loggedIn){e.preventDefault();return;}\n    if(Math.abs(e.deltaX)>Math.abs(e.deltaY))return; // horizontal strips scroll natively\n    var inner=e.target&&e.target.closest?e.target.closest(\".product-grid,.prod-panel\"):null;\n    if(inner&&inner.scrollHeight>inner.clientHeight+1){\n      var down=e.deltaY>0;\n      var canScroll=down?inner.scrollTop+inner.clientHeight<inner.scrollHeight-1:inner.scrollTop>0.5;\n      if(canScroll){edgeArm=Date.now();acc=0;return;} // let inner scroll\n      // at the edge: swallow momentum for a beat so the flip is deliberate\n      if(Date.now()-edgeArm<450){e.preventDefault();return;}\n    }\n    e.preventDefault();\n    var now=Date.now();\n    if(now-lastFlip<800)return;\n    acc+=e.deltaY;\n    if(Math.abs(acc)<60)return;\n    var dir=acc>0?1:-1;acc=0;\n    var screens=[].filter.call(document.querySelectorAll(\".screen\"),function(s){return getComputedStyle(s).display!==\"none\";});\n    var cur=0,best=1e9;\n    screens.forEach(function(s,i){var d=Math.abs(s.offsetTop-root.scrollTop);if(d<best){best=d;cur=i;}});\n    var next=cur+dir;\n    if(next<0||next>=screens.length)return;\n    lastFlip=now;\n    snapScrollTo(screens[next].offsetTop);\n    updateDots(parseInt(screens[next].dataset.idx));\n  },{passive:false});\n}\nfunction initStageContinuity(){\n  var reduceMotion=window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n  var mq=window.matchMedia(\"(max-width: 901px)\");\n  var wasStacked=mq.matches,cachedRect=null;\n  function readRect(){var stage=document.getElementById(\"prod-stage\");var s=document.getElementById(\"s-product\");if(!stage||!s.classList.contains(\"visible\"))return null;return stage.getBoundingClientRect();}\n  function check(){\n    var nowStacked=mq.matches,stage=document.getElementById(\"prod-stage\");\n    if(nowStacked!==wasStacked){\n      if(stage&&cachedRect&&!reduceMotion){\n        var now=stage.getBoundingClientRect();\n        var dLeft=cachedRect.left-now.left,dTop=cachedRect.top-now.top;\n        var sx=cachedRect.width/now.width,sy=cachedRect.height/now.height;\n        stage.style.transition=\"none\";stage.style.transformOrigin=\"top left\";\n        stage.style.transform=\"translate(\"+dLeft+\"px,\"+dTop+\"px) scale(\"+sx+\",\"+sy+\")\";\n        void stage.offsetWidth;\n        requestAnimationFrame(function(){stage.style.transition=\"transform 380ms cubic-bezier(.4,0,.2,1)\";stage.style.transform=\"none\";});\n      }\n      wasStacked=nowStacked;\n    }\n    cachedRect=readRect();\n  }\n  var raf=null;\n  window.addEventListener(\"resize\",function(){if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(check);});\n}\nfunction initHeroCanvas(){\n  var canvas=document.getElementById(\"hero-canvas\");\n  if(!canvas) return;\n  var ctx=canvas.getContext(\"2d\"),CELL=64,W,H,cols,rows,cells;\n  function init(){\n    canvas.width=canvas.offsetWidth*devicePixelRatio;canvas.height=canvas.offsetHeight*devicePixelRatio;\n    ctx.scale(devicePixelRatio,devicePixelRatio);\n    W=canvas.offsetWidth;H=canvas.offsetHeight;\n    cols=Math.ceil(W/CELL)+1;rows=Math.ceil(H/CELL)+1;cells=[];\n    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)cells.push({x:c*CELL,y:r*CELL,val:(Math.random()*9.99).toFixed(2),phase:Math.random()*Math.PI*2,speed:0.003+Math.random()*0.004,isRed:Math.random()<0.04,showVal:Math.random()<0.18});\n  }\n  init();window.addEventListener(\"resize\",init);\n  var t=0;\n  function draw(){\n    ctx.clearRect(0,0,W,H);ctx.fillStyle=\"#0A0A0A\";ctx.fillRect(0,0,W,H);\n    ctx.strokeStyle=\"rgba(255,255,255,0.04)\";ctx.lineWidth=0.5;\n    for(var c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();}\n    for(var r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();}\n    ctx.font='10px \"JetBrains Mono\",monospace';\n    cells.forEach(function(cell){\n      var breath=(Math.sin(t*cell.speed+cell.phase)+1)/2;\n      var dotAlpha=0.05+breath*0.09;\n      ctx.fillStyle=cell.isRed?\"rgba(37,0,253,\"+(dotAlpha*1.9)+\")\":\"rgba(255,255,255,\"+dotAlpha+\")\";\n      ctx.beginPath();ctx.arc(cell.x,cell.y,1.5,0,Math.PI*2);ctx.fill();\n      if(cell.showVal){var valAlpha=0.035+breath*0.055;ctx.fillStyle=cell.isRed?\"rgba(37,0,253,\"+(valAlpha*1.6)+\")\":\"rgba(255,255,255,\"+valAlpha+\")\";ctx.fillText(cell.val,cell.x+5,cell.y+17);}\n    });\n    t++;requestAnimationFrame(draw);\n  }\n  draw();\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
